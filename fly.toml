# Fly.io config for the InstaScribe study backend (single-origin: serves SPA + API).
# Deploy:  fly deploy   (after `fly auth login` + a card on the account)
# The app name must be globally unique — `fly launch`/`fly apps create` will
# confirm or adjust it; keep this in sync with the created app.
app = "instascribe-study"
primary_region = "lhr"   # London — close to UAL participants

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8765"
  STUDY_CORS_ORIGINS = "*"
  # OPENAI_API_KEY and STUDY_QUESTIONNAIRE_URL are set as secrets, not here.

[http_service]
  internal_port = 8765
  force_https = true
  # Always-on for the DM campaign — no cold starts on the first click.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"   # headroom for ffmpeg + concurrent TTS renders
